databaseChangeLog:
  - changeSet:
      id: 202607201900-create-table-preferences
      author: Lucas

      changes:
        - createTable:
            tableName: preferences
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: type_id
                  type: BIGINT
                  constraints:
                    nullable: false


        - addForeignKeyConstraint:
            baseTableName: preferences
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_preferences_user


        - addForeignKeyConstraint:
            baseTableName: preferences
            baseColumnNames: type_id
            referencedTableName: activity_type
            referencedColumnNames: id
            constraintName: fk_preferences_activity_type
spring:
  application:
    name: demo

  datasource:
    url: jdbc:postgresql://localhost:5433/bootcamp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
aws:
  s3:
    region: us-east-1
    bucket: cars-photos
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test
app:
  jwt:
    secret: EIX0nTZL9f6TQ0Yd8eQ4mB+Hf9AnlqkP0Yxv6mI4vUk=
    expiration-ms: 86400000
default:

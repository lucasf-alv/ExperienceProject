databaseChangeLog:
  - changeSet:
      id: 202607201800-create-table-activity-type
      author: Lucas

      changes:
        - createTable:
            tableName: activity_type
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: image
                  type: VARCHAR(255)
                  constraints:
                    nullable: false